<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ERP 입력 자동화</title>
<script type="text/javascript" src="/eel.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
}
#header {
    background: #1e293b;
    padding: 10px 16px;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    gap: 8px;
}
#header h1 { font-size: 14px; font-weight: 700; color: #f1f5f9; }
#header .sub { font-size: 11px; color: #64748b; margin-left: auto; }

/* 창 선택 영역 */
#window-select-area {
    background: #1a2035;
    border-bottom: 1px solid #334155;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
#window-select-area label { font-size: 11px; color: #94a3b8; }
#window-row { display: flex; gap: 6px; align-items: center; }
#windowSelect {
    flex: 1;
    background: #0f1117;
    border: 1px solid #334155;
    color: #e2e8f0;
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 11px;
}
#windowSelect option { background: #0f1117; }
#btnRefreshWindows {
    background: #334155;
    color: #94a3b8;
    border: none;
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
}
#btnRefreshWindows:hover { background: #475569; }
#connectedBadge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #1e3a2f;
    color: #4ade80;
    display: none;
}

/* 레코드 목록 */
#records-area {
    background: #131825;
    border-bottom: 1px solid #1e293b;
    padding: 8px 14px;
    max-height: 100px;
    overflow-y: auto;
}
.day-row {
    font-size: 11px;
    color: #94a3b8;
    padding: 2px 0;
    display: flex;
    align-items: baseline;
    gap: 6px;
}
.day-row .date { color: #60a5fa; font-weight: 600; min-width: 88px; }
.day-row .cnt { color: #22d3ee; font-size: 10px; }

/* 컨트롤 영역 */
#controls {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow: hidden;
}
#status-line { font-size: 11px; color: #64748b; min-height: 14px; }
#status-line.running { color: #34d399; }
#status-line.done    { color: #60a5fa; }
#status-line.error   { color: #f87171; }
#progress-bar {
    width: 100%;
    height: 5px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
}
#progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #22d3ee);
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
}
#progress-text { font-size: 10px; color: #475569; }
#log-area {
    flex: 1;
    background: #0a0e1a;
    border: 1px solid #1e293b;
    border-radius: 5px;
    padding: 7px 9px;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    color: #4ade80;
    overflow-y: auto;
    min-height: 100px;
    white-space: pre-wrap;
    word-break: break-all;
}
#btn-row { display: flex; gap: 8px; flex-shrink: 0; }
button.main-btn {
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
}
button.main-btn:disabled { opacity: 0.45; cursor: not-allowed; }
#btnStart { background: #16a34a; color: #fff; flex: 1; }
#btnStart:hover:not(:disabled) { background: #15803d; }
#btnStop  { background: #dc2626; color: #fff; }
#btnStop:hover:not(:disabled)  { background: #b91c1c; }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:16px">⚙️</span>
  <h1>ERP 입력 자동화</h1>
  <span class="sub" id="headerSub">로딩 중...</span>
</div>

<!-- 창 선택 -->
<div id="window-select-area">
  <label>ERP 창 지정 <span id="connectedBadge">● 연결됨</span></label>
  <div id="window-row">
    <select id="windowSelect">
      <option value="">-- 창을 선택하세요 --</option>
    </select>
    <button id="btnRefreshWindows" onclick="loadWindowList()">🔄 새로고침</button>
  </div>
</div>

<!-- 레코드 목록 -->
<div id="records-area"></div>

<!-- 컨트롤 -->
<div id="controls">
  <div id="status-line">준비 중...</div>
  <div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text">0 / 0</div>
  </div>
  <div id="log-area"></div>
  <div id="btn-row">
    <button class="main-btn" id="btnStart" onclick="startMacro()" disabled>▶ 입력 시작</button>
    <button class="main-btn" id="btnStop"  onclick="stopMacro()"  disabled>■ 중단</button>
  </div>
</div>

<script>
let _userId = '';
let _pollTimer = null;

// ── 초기화 ──────────────────────────────────────
async function init() {
    try {
        const ctx = await eel.get_erp_popup_context()();
        if (!ctx.success || !ctx.dates_records || ctx.dates_records.length === 0) {
            setStatus('레코드 정보를 불러오지 못했습니다. 메인 앱에서 다시 시도하세요.', 'error');
            return;
        }
        _userId = ctx.user_id || '';

        const days = ctx.dates_records;
        const totalRecords = days.reduce((s, d) => s + (d.records?.length || 0), 0);
        document.getElementById('headerSub').textContent = `${days.length}일 / ${totalRecords}건`;

        document.getElementById('records-area').innerHTML = days.map(d => {
            const cnt = d.records?.length || 0;
            const preview = (d.records || []).slice(0, 2).map(r =>
                (r.contractNumber || r.contract_number || '') + ' ' + (r.workContent || r.work_content || '')
            ).join(', ');
            return `<div class="day-row">
                <span class="date">${d.date}</span>
                <span class="cnt">${cnt}건</span>
                <span style="color:#334155;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">${preview}</span>
            </div>`;
        }).join('');

        document.getElementById('btnStart').disabled = false;
        setStatus('창을 선택하거나 바로 [입력 시작]을 누르세요.', '');

        // 창 목록 자동 로드
        await loadWindowList();
    } catch(e) {
        setStatus('초기화 오류: ' + (e?.message || String(e)), 'error');
    }
}

// ── 창 목록 ─────────────────────────────────────
async function loadWindowList() {
    const sel = document.getElementById('windowSelect');
    sel.innerHTML = '<option value="">-- 창을 선택하세요 --</option>';
    try {
        const r = await eel.get_window_list()();
        if (!r.success) return;
        (r.windows || []).forEach(w => {
            const opt = document.createElement('option');
            opt.value = w.hwnd;
            opt.textContent = w.title.length > 50 ? w.title.slice(0, 50) + '…' : w.title;
            // 선진종합시스템 자동 선택
            if (w.title.includes('선진종합시스템')) {
                opt.selected = true;
                opt.textContent = '✔ ' + opt.textContent;
            }
            sel.appendChild(opt);
        });
        // 선진 창이 있으면 자동 지정
        if (sel.value) await selectWindow();
    } catch(e) {}
}

async function selectWindow() {
    const sel = document.getElementById('windowSelect');
    const hwnd = parseInt(sel.value) || 0;
    const badge = document.getElementById('connectedBadge');
    try {
        if (hwnd) {
            await eel.set_erp_target_hwnd(hwnd, _userId)();
            badge.style.display = 'inline';
            setStatus('창 연결됨. [입력 시작]을 누르세요.', 'done');
        } else {
            await eel.set_erp_target_hwnd(0, _userId)();
            badge.style.display = 'none';
        }
    } catch(e) {}
}

// ── 매크로 실행 ──────────────────────────────────
async function startMacro() {
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    setStatus('매크로 실행 중...', 'running');
    appendLog('▶ 자동입력 시작');
    try {
        const r = await eel.start_erp_macro_inline(_userId)();
        if (!r.success) {
            setStatus(r.message || '시작 실패', 'error');
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            return;
        }
        _pollTimer = setInterval(pollStatus, 1000);
    } catch(e) {
        setStatus('오류가 발생했습니다.', 'error');
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
    }
}

async function stopMacro() {
    try {
        await eel.stop_erp_macro(_userId)();
        appendLog('■ 중단 요청 전송');
    } catch(e) {}
}

// ── 상태 폴링 ────────────────────────────────────
async function pollStatus() {
    try {
        const res = await eel.get_erp_macro_status(_userId)();
        if (!res.success) return;

        if (res.total > 0) {
            const pct = Math.round(res.progress / res.total * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent =
                `${res.progress} / ${res.total} (${pct}%) — ${res.current || ''}`;
        }
        if (res.log && res.log.length > 0) {
            const logEl = document.getElementById('log-area');
            logEl.textContent = res.log.join('\n');
            logEl.scrollTop = logEl.scrollHeight;
        }
        if (!res.running) {
            clearInterval(_pollTimer);
            _pollTimer = null;
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            const hasErr = res.log && res.log.some(l =>
                l.includes('찾을 수 없습니다') || l.includes('라이브러리 누락') || l.includes('오류 발생'));
            setStatus(
                hasErr ? '오류가 발생했습니다. 로그를 확인하세요.' :
                res.progress > 0 ? '입력 완료. ERP에서 저장(Ctrl+S)하세요.' : '종료되었습니다.',
                hasErr ? 'error' : res.progress > 0 ? 'done' : ''
            );
        }
    } catch(e) {}
}

// ── 헬퍼 ─────────────────────────────────────────
function setStatus(msg, cls) {
    const el = document.getElementById('status-line');
    el.textContent = msg;
    el.className = cls || '';
}
function appendLog(msg) {
    const el = document.getElementById('log-area');
    el.textContent += (el.textContent ? '\n' : '') + msg;
    el.scrollTop = el.scrollHeight;
}

// ── Eel 연결 대기 후 초기화 ──────────────────────
async function waitEelReady(maxMs = 5000) {
    const start = Date.now();
    while (Date.now() - start < maxMs) {
        try {
            if (typeof eel !== 'undefined') {
                const ws = eel._websocket || eel._ws || null;
                if (!ws || ws.readyState === 1) return true;
            }
        } catch(_) {}
        await new Promise(r => setTimeout(r, 150));
    }
    return false;
}

document.addEventListener('DOMContentLoaded', async () => {
    setStatus('서버 연결 중...', '');
    await waitEelReady();
    await new Promise(r => setTimeout(r, 200));
    init();
});

// 창 선택 변경 이벤트
document.getElementById('windowSelect').addEventListener('change', selectWindow);
</script>
</body>
</html>
